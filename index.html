<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice → Email</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; color: #1a1a1a; background: #fff; min-height: 100vh; }

  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
  @keyframes slideUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
  @keyframes waveform { 0% { height:6px } 50% { height:22px } 100% { height:6px } }

  .container { max-width: 560px; margin: 0 auto; padding: 48px 24px; }

  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
  .icon-wrap { width: 44px; height: 44px; border-radius: 12px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; letter-spacing: -.01em; }
  .subtitle { margin-top: 2px; font-size: 13px; color: #888; }

  .dropzone {
    border: 2px dashed #d0d0d0; border-radius: 16px; padding: 48px 24px;
    text-align: center; cursor: pointer; transition: all .2s;
  }
  .dropzone:hover, .dropzone.drag-over { border-color: #999; background: #f7f7f7; }
  .dropzone.drag-over { border-color: #1a1a1a; }
  .drop-icon {
    width: 52px; height: 52px; border-radius: 50%; background: #f5f5f5;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 14px;
  }
  .drop-text { font-size: 15px; font-weight: 500; color: #333; }
  .drop-hint { margin-top: 6px; font-size: 12px; color: #aaa; }

  .file-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; background: #fafafa; border-radius: 14px; border: 1px solid #eee;
    animation: slideUp .3s ease-out;
  }
  .file-info { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .file-icon {
    width: 40px; height: 40px; border-radius: 10px; background: #f0f0f0;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-meta { margin-top: 2px; font-size: 12px; color: #999; }
  .remove-btn {
    border: none; background: transparent; color: #bbb; cursor: pointer;
    padding: 4px; border-radius: 6px; display: flex; flex-shrink: 0;
  }
  .remove-btn:hover { color: #888; }

  .waveform { display: flex; gap: 3px; align-items: center; height: 28px; }
  .waveform span { width: 3px; border-radius: 2px; background: #1a1a1a; }
  .waveform span:nth-child(1) { animation: waveform .8s 0s infinite ease-in-out; }
  .waveform span:nth-child(2) { animation: waveform .8s .15s infinite ease-in-out; }
  .waveform span:nth-child(3) { animation: waveform .8s .3s infinite ease-in-out; }
  .waveform span:nth-child(4) { animation: waveform .8s .45s infinite ease-in-out; }
  .waveform span:nth-child(5) { animation: waveform .8s .6s infinite ease-in-out; }

  .error-box {
    margin-top: 12px; padding: 10px 14px; border-radius: 10px;
    background: #fff5f5; border: 1px solid #fdd; color: #c44;
    font-size: 13px; display: flex; align-items: center; gap: 8px;
  }
  .retry-btn {
    margin-left: auto; border: none; background: transparent;
    color: #c44; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px;
  }

  .primary-btn {
    margin-top: 16px; width: 100%; padding: 14px 20px; border-radius: 12px;
    border: none; background: #1a1a1a; color: #fff; font-size: 14px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .15s, box-shadow .15s;
  }
  .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.18); }
  .primary-btn:disabled { opacity: .5; pointer-events: none; }

  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; margin-top: 24px; }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; }
  .section-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #666; }

  .email-box { border-radius: 12px; border: 1px solid #eee; overflow: hidden; background: #fff; animation: slideUp .4s ease-out; }
  .email-text {
    margin: 0; padding: 18px 20px; font-size: 13px; line-height: 1.7; color: #333;
    font-family: 'DM Sans', sans-serif; white-space: pre-wrap; word-wrap: break-word;
  }
  .email-actions {
    display: flex; gap: 8px; padding: 10px 16px;
    border-top: 1px solid #f0f0f0; background: #fafafa;
  }
  .action-btn {
    padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff;
    font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; gap: 6px; color: #333; transition: background .15s;
  }
  .action-btn:hover { background: #f0f0f0; }
  .action-btn.ghost { border-color: transparent; color: #888; }

  .audio-section { margin-top: 12px; animation: slideUp .3s ease-out; }
  .audio-player {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; background: #fafafa; border: 1px solid #eee; border-radius: 12px;
  }
  .play-btn {
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: #1a1a1a; color: #fff; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; transition: opacity .15s;
  }
  .play-btn:hover { opacity: .8; }
  .audio-progress { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .progress-bar-wrap {
    width: 100%; height: 4px; background: #e8e8e8; border-radius: 2px; cursor: pointer; position: relative;
  }
  .progress-bar-fill { height: 100%; background: #1a1a1a; border-radius: 2px; width: 0%; transition: width .1s linear; }
  .audio-times { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; }

  .hidden { display: none !important; }

  /* Auth screen */
  .auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px; padding: 24px; text-align: center;
  }
  .auth-logo { width: 56px; height: 56px; border-radius: 16px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
  .auth-title { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; }
  .auth-subtitle { font-size: 13px; color: #888; margin-top: 4px; }
  .google-btn {
    display: flex; align-items: center; gap: 10px; padding: 12px 22px;
    border: 1px solid #ddd; border-radius: 10px; background: #fff;
    font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background .15s, box-shadow .15s; color: #1a1a1a;
  }
  .google-btn:hover { background: #f7f7f7; box-shadow: 0 2px 8px rgba(0,0,0,.08); }

  /* User badge in header */
  .user-badge { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%; object-fit: cover;
    border: 1px solid #eee; flex-shrink: 0;
  }
  .user-avatar-placeholder {
    width: 30px; height: 30px; border-radius: 50%; background: #f0f0f0;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    font-weight: 600; color: #555; flex-shrink: 0;
  }
  .user-name { font-size: 13px; font-weight: 500; color: #333; }
  .signout-btn {
    border: none; background: transparent; font-size: 12px; color: #aaa;
    cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 4px 6px;
    border-radius: 6px; transition: color .15s;
  }
  .signout-btn:hover { color: #555; }
</style>
</head>
<body>

<!-- Sign-in screen -->
<div id="authScreen" class="auth-screen">
  <div>
    <div class="auth-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <p class="auth-title" style="margin-top:16px">Voice → Email</p>
    <p class="auth-subtitle">Sign in to start converting voice notes to emails.</p>
  </div>
  <button class="google-btn" id="googleSignInBtn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
    Continue with Google
  </button>
</div>

<!-- App screen (hidden until authenticated) -->
<div id="appScreen" class="hidden">
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <div>
      <h1>Voice → Email</h1>
      <p class="subtitle">Record your thoughts. Get a polished email.</p>
    </div>
    <div class="user-badge">
      <div id="userAvatar"></div>
      <span class="user-name" id="userName"></span>
      <button class="signout-btn" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <!-- Drop zone -->
  <div id="dropzone" class="dropzone">
    <input id="fileInput" type="file" accept="audio/*,.mp3,.wav,.m4a,.flac,.ogg,.webm,.aac" style="display:none">
    <div class="drop-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <p class="drop-text">Drop your audio file here</p>
    <p class="drop-hint">or click to browse · MP3, WAV, M4A, FLAC</p>
  </div>

  <!-- File card -->
  <div id="fileCard" class="file-card hidden">
    <div class="file-info">
      <div class="file-icon" id="fileIcon">
        <svg id="musicIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <div id="waveIcon" class="waveform hidden"><span></span><span></span><span></span><span></span><span></span></div>
        <svg id="checkIcon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4a9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="min-width:0">
        <p class="file-name" id="fileName"></p>
        <p class="file-meta" id="fileMeta"></p>
      </div>
    </div>
    <button class="remove-btn" id="removeBtn" title="Remove">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Error -->
  <div id="errorBox" class="error-box hidden">
    <span>⚠</span> <span id="errorText"></span>
    <button class="retry-btn" id="retryBtn">Retry</button>
  </div>

  <!-- Action -->
  <button id="generateBtn" class="primary-btn hidden">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Generate Email
  </button>

  <!-- Audio playback -->
  <div id="audioSection" class="audio-section hidden">
    <div class="audio-player">
      <button class="play-btn" id="playBtn" title="Play / Pause">
        <svg id="playIcon" width="14" height="14" viewBox="0 0 24 24" fill="#fff" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="pauseIcon" class="hidden" width="14" height="14" viewBox="0 0 24 24" fill="#fff" stroke="none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <div class="audio-progress">
        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="audio-times">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>
    </div>
    <audio id="audioEl"></audio>
  </div>

  <!-- Result -->
  <div id="resultSection" class="hidden">
    <div class="section-header">
      <div class="section-dot" style="background:#e67"></div>
      <span class="section-label">Generated Email</span>
    </div>
    <div class="email-box">
      <pre class="email-text" id="emailText"></pre>
      <div class="email-actions">
        <button class="action-btn" id="copyBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="action-btn ghost" id="newBtn">New Recording</button>
      </div>
    </div>
  </div>
</div>
</div>

<script type="module">
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCv_zR0pU9zromm_wTtozc1MXo3jdu1SGo",
  authDomain: "test-project-62c72.firebaseapp.com",
  projectId: "test-project-62c72",
  storageBucket: "test-project-62c72.firebasestorage.app",
  messagingSenderId: "242081757191",
  appId: "1:242081757191:web:525aa97a9b1b6e4fc692a2",
};

const $ = id => document.getElementById(id);

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    // Show app, hide sign-in
    $("authScreen").classList.add("hidden");
    $("appScreen").classList.remove("hidden");

    // Populate user badge
    $("userName").textContent = user.displayName?.split(" ")[0] ?? user.email;
    const avatarEl = $("userAvatar");
    if (user.photoURL) {
      avatarEl.innerHTML = `<img class="user-avatar" src="${user.photoURL}" referrerpolicy="no-referrer">`;
    } else {
      const initials = (user.displayName ?? user.email ?? "?").charAt(0).toUpperCase();
      avatarEl.innerHTML = `<div class="user-avatar-placeholder">${initials}</div>`;
    }
  } else {
    $("authScreen").classList.remove("hidden");
    $("appScreen").classList.add("hidden");
  }
});

$("googleSignInBtn").addEventListener("click", () => signInWithPopup(auth, provider));
$("signOutBtn").addEventListener("click", () => { signOut(auth); reset(); });

async function getAuthHeader() {
  if (!currentUser) throw new Error("Not authenticated");
  const token = await currentUser.getIdToken();
  return "Bearer " + token;
}

const API_URL = "https://4d67-49-144-35-24.ngrok-free.app/transcribe";

let currentFile = null;

const dropzone = $("dropzone");
const fileInput = $("fileInput");
const fileCard = $("fileCard");
const generateBtn = $("generateBtn");
const errorBox = $("errorBox");
const resultSection = $("resultSection");

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / 1048576).toFixed(1) + " MB";
}

function showError(msg) {
  $("errorText").textContent = msg;
  errorBox.classList.remove("hidden");
}

function hideError() { errorBox.classList.add("hidden"); }

function setFileIcon(state) {
  $("musicIcon").classList.toggle("hidden", state !== "idle");
  $("waveIcon").classList.toggle("hidden", state !== "processing");
  $("checkIcon").classList.toggle("hidden", state !== "done");
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  return m + ":" + String(Math.floor(s % 60)).padStart(2, "0");
}

function setupAudioPlayer(file) {
  const audio = $("audioEl");
  const url = URL.createObjectURL(file);
  audio.src = url;

  audio.addEventListener("loadedmetadata", () => {
    $("duration").textContent = formatTime(audio.duration);
  });
  audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    $("progressFill").style.width = (audio.currentTime / audio.duration * 100) + "%";
    $("currentTime").textContent = formatTime(audio.currentTime);
  });
  audio.addEventListener("ended", () => {
    $("playIcon").classList.remove("hidden");
    $("pauseIcon").classList.add("hidden");
    $("progressFill").style.width = "0%";
    $("currentTime").textContent = "0:00";
    audio.currentTime = 0;
  });

  $("playBtn").onclick = () => {
    if (audio.paused) {
      audio.play();
      $("playIcon").classList.add("hidden");
      $("pauseIcon").classList.remove("hidden");
    } else {
      audio.pause();
      $("playIcon").classList.remove("hidden");
      $("pauseIcon").classList.add("hidden");
    }
  };

  $("progressWrap").addEventListener("click", e => {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  $("audioSection").classList.remove("hidden");
}

function reset() {
  const audio = $("audioEl");
  audio.pause();
  audio.src = "";
  $("playIcon").classList.remove("hidden");
  $("pauseIcon").classList.add("hidden");
  $("progressFill").style.width = "0%";
  $("currentTime").textContent = "0:00";
  $("duration").textContent = "0:00";
  $("audioSection").classList.add("hidden");

  currentFile = null;
  fileInput.value = "";
  dropzone.classList.remove("hidden");
  fileCard.classList.add("hidden");
  generateBtn.classList.add("hidden");
  resultSection.classList.add("hidden");
  hideError();
  setFileIcon("idle");
}

function loadFile(file) {
  if (!file) return;
  const ext = file.name?.split(".").pop()?.toLowerCase();
  const valid = file.type?.startsWith("audio/") || file.type?.startsWith("video/") ||
    ["mp3","wav","m4a","mp4","webm","ogg","flac","aac","mpeg"].includes(ext);
  if (!valid) { showError("Unsupported file type. Please upload an audio file."); return; }

  currentFile = file;
  hideError();
  resultSection.classList.add("hidden");

  $("fileName").textContent = file.name;
  $("fileMeta").textContent = formatSize(file.size) + " · Ready";
  setFileIcon("idle");

  dropzone.classList.add("hidden");
  fileCard.classList.remove("hidden");
  generateBtn.classList.remove("hidden");
  $("removeBtn").classList.remove("hidden");
}

// Drag & drop
dropzone.addEventListener("click", () => fileInput.click());
dropzone.addEventListener("dragover", e => { e.preventDefault(); dropzone.classList.add("drag-over"); });
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
dropzone.addEventListener("drop", e => { e.preventDefault(); dropzone.classList.remove("drag-over"); loadFile(e.dataTransfer.files?.[0]); });
fileInput.addEventListener("change", e => loadFile(e.target.files?.[0]));
$("removeBtn").addEventListener("click", reset);
$("newBtn").addEventListener("click", reset);
$("retryBtn").addEventListener("click", () => { hideError(); generateBtn.classList.remove("hidden"); });

// Copy
$("copyBtn").addEventListener("click", async () => {
  const btn = $("copyBtn");
  try { await navigator.clipboard.writeText($("emailText").textContent); } catch {
    const ta = document.createElement("textarea"); ta.value = $("emailText").textContent;
    document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  }
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4a9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied';
  setTimeout(() => {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
  }, 2000);
});

// Generate
generateBtn.addEventListener("click", async () => {
  if (!currentFile) return;
  generateBtn.classList.add("hidden");
  hideError();
  $("removeBtn").classList.add("hidden");
  setFileIcon("processing");
  $("fileMeta").textContent = formatSize(currentFile.size) + " · Processing…";

  try {
    const formData = new FormData();
    formData.append("file", currentFile);

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { Authorization: await getAuthHeader() },
      body: formData,
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => "");
      throw new Error("Request failed (" + res.status + ")" + (errText ? ": " + errText : ""));
    }

    const data = await res.json();
    const text = typeof data === "string" ? data :
      data.email || data.result || data.output || data.text ||
      data.transcription || data.transcript || data.message ||
      data.response || data.content || JSON.stringify(data, null, 2);

    $("emailText").textContent = text;
    setFileIcon("done");
    $("fileMeta").textContent = formatSize(currentFile.size) + " · Complete";
    $("removeBtn").classList.remove("hidden");
    setupAudioPlayer(currentFile);
    resultSection.classList.remove("hidden");

  } catch (err) {
    showError(err.message);
    setFileIcon("idle");
    $("fileMeta").textContent = formatSize(currentFile.size) + " · Error";
    $("removeBtn").classList.remove("hidden");
    generateBtn.classList.remove("hidden");
  }
});
</script>
